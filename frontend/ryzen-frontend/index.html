<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryzen</title>

    <div class="overlayEffect"></div>

    <div class="layout-grid">
      <div class="leftside">
        <aside class="neoBrutal left">
          <div class="top">
            <img class="ryzen" src="./src/assets/ryzen.svg" /> <img />
            <h1 class="logo">hokaido</h1>
          </div>

          <div class="bottom">
            <div class="botTop">
              <p>ATTRIBUTES</p>
              <p>
                <span id="typed"></span>
              </p>
            </div>
            <div class="botBot">
              <h1>Home</h1>
              <hr class="selection-highlight" />
              <h1>About</h1>
            </div>
          </div>
        </aside>
      </div>

      <main>
        <nav class="top">
          <div class="inside">
            <input
              id="searchInput"
              type="text"
              class="searchDimension neoBrutal2"
              placeholder="Search"
            />
          </div>
        </nav>

        <header class="stories neoBrutal">
          <h1 class="stories">STORIES</h1>
          <div class="stories-grid">
            <button class="leftArrow">
              <embed class="embed" src="./src/assets/arrow.svg" />
            </button>

            <!-- for stories-->
            <div class="storyContainer" id="storyContainer"></div>

            <button class="rightArrow">
              <embed class="Arrow" src="./src/assets/arrow.svg" />
            </button>
          </div>
        </header>

        <div id="post-feed"></div>

        <article class="end neoBrutal">
          <p>that's the end of the blog, I guess</p>
        </article>
      </main>

      <div class="rightside">
        <aside class="right1 neoBrutal">
          <p>Now Playing</p>
          <p></p>
          <p class="songText">Sunkissed LOLA</p>

          <div class="animate overlay">
            <!--outline-->
            <div class="overlay2">
              <!--ablum-->
              <img src="./src/assets/albumArt.jpg" class="albumArt" />
            </div>
          </div>

          <div class="attributes">
            <div class="att1">
              <p class="artist">Sunkissed Lola</p>
              <p> • </p>
              <p class="name">Tumatalima</p>
              <p> • </p>
              <p class="albumName">Olaholah</p>
            </div>

            <p class="time">1:43</p>
          </div>
        </aside>

        <aside class="right2 neoBrutal">
          <h1 class="quickLinks">QUICK LINKS</h1>
          <div class="botBot rightSide">
            <h1>Setup</h1>
            <hr class="selection-highlight" />
            <h1>Socials</h1>
            <h1>CV</h1>
          </div>
        </aside>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <link rel="stylesheet" href="./src/style.scss" />
  </head>
</html>
